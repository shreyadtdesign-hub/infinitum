<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITUM</title>
<link rel="stylesheet" href="https://unpkg.com/lenis@1.3.23/dist/lenis.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    overflow-x: hidden;
  }

  html, body {
    background: #04101A;
    color: #EAF3F1;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    cursor: none;
  }

  @media (hover: none) {
    html, body { cursor: auto; }
  }

  /* ── TRACKS (invisible scroll-length spacers) ──────────────── */
  .track {
    position: relative;
    width: 100%;
  }

  #track-reef    { height: 320vh; }
  #track-deep    { height: 420vh; }
  #track-current { height: 300vh; }

  /* ── SCENE LAYERS (fixed, cross-fade via JS on .scene-inner) ─ */
  .scene-layer {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  #scene-reef    { z-index: 1; }
  #scene-deep    { z-index: 2; }
  #scene-current { z-index: 3; }

  .scene-inner {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .track-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    /* Unifies color temperature across the three separately-lit scenes
       into one consistent "grade" rather than relying on cross-fade alone. */
    filter: saturate(1.1) contrast(1.06) brightness(0.98) hue-rotate(-2deg);
  }

  .track-poster {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    transition: opacity 0.4s;
    z-index: 1;
    filter: saturate(1.1) contrast(1.06) brightness(0.98) hue-rotate(-2deg);
  }

  .track-poster.hidden { opacity: 0; pointer-events: none; }

  /* ── VIGNETTE (unifies contrast/legibility across all scenes) ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, rgba(4,16,26,0) 35%, rgba(4,16,26,0.65) 100%),
      linear-gradient(to bottom, rgba(4,16,26,0.35) 0%, rgba(4,16,26,0) 18%, rgba(4,16,26,0) 72%, rgba(4,16,26,0.6) 100%);
  }

  /* ── FILM GRAIN ─────────────────────────────────────────────── */
  .grain {
    position: fixed;
    inset: -60px;
    z-index: 11;
    pointer-events: none;
    opacity: 0.05;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-repeat: repeat;
    animation: grainShift 8s steps(8) infinite;
  }

  @keyframes grainShift {
    0%    { transform: translate(0,0); }
    12.5% { transform: translate(-2%,2%); }
    25%   { transform: translate(2%,-2%); }
    37.5% { transform: translate(-1%,-1%); }
    50%   { transform: translate(1%,2%); }
    62.5% { transform: translate(-2%,1%); }
    75%   { transform: translate(2%,2%); }
    87.5% { transform: translate(-1%,-2%); }
    100%  { transform: translate(0,0); }
  }

  /* ── SCROLL CUE (first-load only, fades on first scroll) ────── */
  .scroll-cue {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .scroll-cue span {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(234,243,241,0.45);
  }
  .scroll-cue .chevron {
    width: 8px;
    height: 8px;
    border-right: 1px solid rgba(234,243,241,0.45);
    border-bottom: 1px solid rgba(234,243,241,0.45);
    transform: rotate(45deg);
    animation: chevronBob 1.8s ease-in-out infinite;
  }
  @keyframes chevronBob {
    0%, 100% { transform: rotate(45deg) translate(0,0); opacity: 0.4; }
    50%      { transform: rotate(45deg) translate(3px,3px); opacity: 1; }
  }

  /* ── LOOP FADE MASK (hides the scroll-reset cut) ────────────── */
  .loop-fade {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #04101A;
    opacity: 0;
    pointer-events: none;
  }

  /* ── MUTE TOGGLE ─────────────────────────────────────────────── */
  #mute-toggle {
    position: fixed;
    bottom: 24px;
    right: 28px;
    z-index: 100;
    background: none;
    border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 0.5px;
    color: rgba(234,243,241,0.5);
    cursor: none;
    transition: color 0.2s;
  }
  #mute-toggle:hover { color: rgba(234,243,241,0.85); }

  @media (hover: none) {
    #mute-toggle { cursor: pointer; }
  }

  /* ── CUSTOM CURSOR ───────────────────────────────────────────── */
  .cursor-dot {
    position: fixed;
    top: 0;
    left: 0;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(234,243,241,0.7);
    pointer-events: none;
    z-index: 300;
    transform: translate(-50%, -50%);
    transition: width 0.2s ease, height 0.2s ease, background 0.2s ease;
    mix-blend-mode: difference;
  }
  .cursor-dot.hovering {
    width: 22px;
    height: 22px;
    background: rgba(234,243,241,0.9);
  }
  @media (hover: none) {
    .cursor-dot { display: none; }
  }

  /* ── REDUCED MOTION ──────────────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    .grain { animation: none; }
    .scroll-cue .chevron { animation: none; }
    .track-poster { transition: none; }
  }

  /* ── FISH LAYER ──────────────────────────────────────────── */
  .fish-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 18vw;
    height: auto;
    min-width: 120px;
    max-width: 280px;
    transform: translate(-50%, -50%);
    z-index: 50;
    pointer-events: none;
    will-change: transform;
  }

  /* ── TEXT OVERLAYS ───────────────────────────────────────── */
  .text-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    z-index: 60;
    pointer-events: none;
    opacity: 0;
    text-align: center;
    padding: 0 5vw 12vh;
  }

  .text-overlay.active { pointer-events: none; }

  /* ── CHROME ──────────────────────────────────────────────── */
  #wordmark {
    position: fixed;
    top: 24px;
    left: 24px;
    font-family: 'Fraunces', serif;
    font-size: 14px;
    letter-spacing: 6px;
    color: #EAF3F1;
    z-index: 100;
    user-select: none;
    text-transform: uppercase;
  }

  #corner-link {
    position: fixed;
    top: 24px;
    right: 28px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: rgba(234,243,241,0.5);
    text-decoration: none;
    z-index: 100;
    letter-spacing: 0.5px;
    cursor: none;
    transition: color 0.2s;
  }
  #corner-link:hover { color: rgba(234,243,241,0.85); }

  @media (hover: none) {
    #corner-link { cursor: pointer; }
  }

  /* ── HERO TEXT ───────────────────────────────────────────── */
  #text-hero .hero-main {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 5vw, 40px);
    font-weight: 400;
    color: #EAF3F1;
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  #text-hero .hero-sub {
    font-family: 'Fraunces', serif;
    font-size: clamp(10px, 1.5vw, 12px);
    font-weight: 400;
    color: rgba(234,243,241,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── CLOSING TEXT ────────────────────────────────────────── */
  #text-closing .closing-main {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: clamp(13px, 2vw, 16px);
    font-weight: 400;
    color: #EAF3F1;
    letter-spacing: 0.5px;
    line-height: 1.5;
    max-width: 520px;
  }
</style>
</head>
<body>

<!-- ── WORDMARK + CORNER LINK ──────────────────────────────── -->
<div id="wordmark">INFINITUM</div>
<a id="corner-link" href="https://shreya.design">← shreya.design</a>

<!-- ── TRACKS (invisible scroll-length spacers only) ─────────── -->
<div id="track-reef" class="track"></div>
<div id="track-deep" class="track"></div>
<div id="track-current" class="track"></div>

<!-- ── SCENE LAYERS (fixed, cross-faded via JS) ───────────────── -->
<div class="scene-layer" id="scene-reef">
  <div class="scene-inner" id="scene-reef-inner">
    <video class="track-video" id="video-reef" muted playsinline preload="none">
      <source src="reef-house.webm" type="video/webm">
      <source src="reef-house.mp4" type="video/mp4">
    </video>
    <img class="track-poster" id="poster-reef" src="poster-reef.png.png" alt="">
  </div>
</div>

<div class="scene-layer" id="scene-deep">
  <div class="scene-inner" id="scene-deep-inner">
    <video class="track-video" id="video-deep" muted playsinline preload="none">
      <source src="the-deep.webm" type="video/webm">
      <source src="the-deep.mp4" type="video/mp4">
    </video>
    <img class="track-poster" id="poster-deep" src="poster-deep.png.png" alt="">
  </div>
</div>

<div class="scene-layer" id="scene-current">
  <div class="scene-inner" id="scene-current-inner">
    <video class="track-video" id="video-current" muted playsinline preload="none">
      <source src="current.webm" type="video/webm">
      <source src="current.mp4" type="video/mp4">
    </video>
    <img class="track-poster" id="poster-current" src="poster-current.png.png" alt="">
  </div>
</div>

<!-- ── VIGNETTE + GRAIN ─────────────────────────────────────────── -->
<div class="vignette"></div>
<div class="grain"></div>

<!-- ── FISH LAYER ───────────────────────────────────────────── -->
<video class="fish-layer" id="fish" muted playsinline loop autoplay>
  <source src="fish-idle.webm" type="video/webm">
</video>

<!-- ── TEXT OVERLAYS ────────────────────────────────────────── -->
<div class="text-overlay" id="text-hero">
  <div class="hero-main">Follow the Life</div>
  <div class="hero-sub">The Ocean Is Endless</div>
</div>

<div class="text-overlay" id="text-closing">
  <div class="closing-main">Lost in the depths, found in the infinite.</div>
</div>

<!-- ── SCROLL CUE ───────────────────────────────────────────── -->
<div class="scroll-cue" id="scroll-cue">
  <span>Scroll</span>
  <div class="chevron"></div>
</div>

<!-- ── LOOP FADE MASK ───────────────────────────────────────── -->
<div class="loop-fade" id="loop-fade"></div>

<!-- ── AMBIENT SOUND TOGGLE ─────────────────────────────────── -->
<button id="mute-toggle" aria-label="Toggle ambient sound">Sound Off</button>

<!-- ── CUSTOM CURSOR ────────────────────────────────────────── -->
<div class="cursor-dot" id="cursor-dot"></div>

<script>
// ── LENIS ───────────────────────────────────────────────────
const lenis = new Lenis({ lerp: 0.075, smoothWheel: true, syncTouch: true, wheelMultiplier: 1, touchMultiplier: 1.2 });
lenis.on("scroll", ScrollTrigger.update);
gsap.ticker.add((time) => { lenis.raf(time * 1000); });
gsap.ticker.lagSmoothing(0);

// ── HELPERS ────────────────────────────────────────────────
const clamp   = (v, lo, hi) => Math.min(Math.max(v, lo), hi);
const clamp01 = (v) => clamp(v, 0, 1);
const lerp    = (a, b, t) => a + (b - a) * t;
const easeInOutCubic = (t) => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

// Frame-rate-independent easing: a fixed lerp factor per call reaches its
// target faster on a 120Hz display than a 60Hz one, since it runs twice as
// often. Normalizing against elapsed time keeps motion speed consistent
// across refresh rates and any frame-time jitter.
const REF_FRAME_MS = 1000 / 60;
function timeLerp(current, target, factor, dt) {
  const adjusted = 1 - Math.pow(1 - factor, dt / REF_FRAME_MS);
  return lerp(current, target, adjusted);
}

const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

// ── TRACK REFERENCES (invisible scroll-length spacers) ────────
const trackReef    = document.getElementById("track-reef");
const trackDeep    = document.getElementById("track-deep");
const trackCurrent = document.getElementById("track-current");

const videoReef    = document.getElementById("video-reef");
const videoDeep    = document.getElementById("video-deep");
const videoCurrent = document.getElementById("video-current");

const posterReef    = document.getElementById("poster-reef");
const posterDeep    = document.getElementById("poster-deep");
const posterCurrent = document.getElementById("poster-current");

const sceneReefInner    = document.getElementById("scene-reef-inner");
const sceneDeepInner    = document.getElementById("scene-deep-inner");
const sceneCurrentInner = document.getElementById("scene-current-inner");

// Per-track progress (0-1 across just that track's own scroll range)
function trackLocalProgress(track) {
  const total = track.offsetHeight - window.innerHeight;
  const rect = track.getBoundingClientRect();
  const passed = clamp(-rect.top, 0, total);
  return total > 0 ? passed / total : 0;
}

// ── VIDEO DURATIONS ────────────────────────────────────────────
let durationReef = 0, durationDeep = 0, durationCurrent = 0;
function captureDuration(video, setDuration) {
  function onMeta() {
    if (video.duration && Number.isFinite(video.duration)) setDuration(video.duration);
  }
  if (video.readyState >= 1 && video.duration && Number.isFinite(video.duration)) onMeta();
  else video.addEventListener("loadedmetadata", onMeta, { once: true });
}
captureDuration(videoReef, (d) => { durationReef = d; videoReef.pause(); });
captureDuration(videoDeep, (d) => { durationDeep = d; videoDeep.pause(); });
captureDuration(videoCurrent, (d) => { durationCurrent = d; videoCurrent.pause(); });

// Hide poster once video has enough data — driven by the video's own
// readiness events, not by scroll ticks, so it reveals even if the user
// isn't scrolling at the moment the video finishes buffering.
function hidePosterWhenReady(video, poster) {
  function reveal() {
    if (video.readyState < 2) return;
    poster.classList.add("hidden");
    video.removeEventListener("loadeddata", reveal);
    video.removeEventListener("canplay", reveal);
    video.removeEventListener("canplaythrough", reveal);
  }
  if (video.readyState >= 2) reveal();
  else {
    video.addEventListener("loadeddata", reveal);
    video.addEventListener("canplay", reveal);
    video.addEventListener("canplaythrough", reveal);
  }
}
hidePosterWhenReady(videoReef, posterReef);
hidePosterWhenReady(videoDeep, posterDeep);
hidePosterWhenReady(videoCurrent, posterCurrent);

// ── LAZY LOAD via IntersectionObserver ───────────────────────
const lazyObs = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const trackEl = entry.target;
      if (trackEl === trackReef) videoReef.load();
      else if (trackEl === trackDeep) videoDeep.load();
      else if (trackEl === trackCurrent) videoCurrent.load();
      lazyObs.unobserve(trackEl);
    }
  });
}, { rootMargin: "100% 0px" });

lazyObs.observe(trackReef);
lazyObs.observe(trackDeep);
lazyObs.observe(trackCurrent);

// ── SMOOTH BACKGROUND SCRUB ────────────────────────────────────
// Eases each video's currentTime toward the scroll-driven target every
// frame instead of snapping to it, so scrubbing reads as a fluid glide
// rather than a hard frame jump on every scroll tick.
const smoothTime = { reef: 0, deep: 0, current: 0 };
function smoothScrub(video, localProgress, duration, key, dt) {
  if (!duration || !Number.isFinite(duration)) return;
  const target = clamp(localProgress * duration, 0, duration);
  smoothTime[key] = timeLerp(smoothTime[key], target, 0.1, dt);
  if (video.readyState >= 2) video.currentTime = smoothTime[key];
}

// ── COMBINED SCROLL PROGRESS ─────────────────────────────────
// Weights: reef=320vh, deep=420vh, current=300vh → total=1040vh
// Combined progress maps 0→1 across all three tracks
const TOTAL_H = 320 + 420 + 300; // vh-proportional units
const REEF_W = 320 / TOTAL_H;
const DEEP_W = 420 / TOTAL_H;
const CURR_W = 300 / TOTAL_H;

function getCombinedProgress(pReef, pDeep, pCurrent) {
  const scrollY = window.scrollY;
  const deepStart    = trackReef.offsetHeight;
  const currentStart = trackReef.offsetHeight + trackDeep.offsetHeight;

  let combined;
  if (scrollY <= deepStart) combined = pReef * REEF_W;
  else if (scrollY <= currentStart) combined = REEF_W + pDeep * DEEP_W;
  else combined = REEF_W + DEEP_W + pCurrent * CURR_W;
  return clamp01(combined);
}

// ── SCENE CROSS-FADE ────────────────────────────────────────────
// Fades the *inner* content of each scene layer near track boundaries
// (rule 7: never animate the container, only its children) so one scene
// dissolves into the next instead of hard-cutting between videos.
const FADE_ZONE = 0.02;

// ── CURSOR PARALLAX ─────────────────────────────────────────────
// A few px of eased background drift toward the cursor adds depth
// without being distracting. Applied to the same .scene-inner children
// that the cross-fade animates (never the fixed .scene-layer container).
let mouseNormX = 0, mouseNormY = 0;
const cursorDot = document.getElementById("cursor-dot");
window.addEventListener("mousemove", (e) => {
  mouseNormX = (e.clientX / window.innerWidth) * 2 - 1;
  mouseNormY = (e.clientY / window.innerHeight) * 2 - 1;
  cursorDot.style.left = e.clientX + "px";
  cursorDot.style.top = e.clientY + "px";
});
[document.getElementById("corner-link"), document.getElementById("mute-toggle")].forEach((el) => {
  el.addEventListener("mouseenter", () => cursorDot.classList.add("hovering"));
  el.addEventListener("mouseleave", () => cursorDot.classList.remove("hovering"));
});
let parallaxX = 0, parallaxY = 0;

function updateSceneOpacity(combined, dt) {
  const b1 = REEF_W;
  const b2 = REEF_W + DEEP_W;

  let reefOp = 1;
  if (combined > b1 - FADE_ZONE) reefOp = 1 - clamp01((combined - (b1 - FADE_ZONE)) / (2 * FADE_ZONE));

  let deepOp = 1;
  if (combined < b1 + FADE_ZONE) deepOp = clamp01((combined - (b1 - FADE_ZONE)) / (2 * FADE_ZONE));
  else if (combined > b2 - FADE_ZONE) deepOp = 1 - clamp01((combined - (b2 - FADE_ZONE)) / (2 * FADE_ZONE));

  let currOp = 1;
  if (combined < b2 + FADE_ZONE) currOp = clamp01((combined - (b2 - FADE_ZONE)) / (2 * FADE_ZONE));

  if (!reduceMotion) {
    parallaxX = timeLerp(parallaxX, mouseNormX * 10, 0.03, dt);
    parallaxY = timeLerp(parallaxY, mouseNormY * 6, 0.03, dt);
  }
  const parallaxTransform = `translate(${parallaxX}px, ${parallaxY}px) scale(1.04)`;

  sceneReefInner.style.opacity = reefOp;
  sceneDeepInner.style.opacity = deepOp;
  sceneCurrentInner.style.opacity = currOp;
  sceneReefInner.style.transform = parallaxTransform;
  sceneDeepInner.style.transform = parallaxTransform;
  sceneCurrentInner.style.transform = parallaxTransform;
}

// ── FISH LAYER ───────────────────────────────────────────────
const fishEl = document.getElementById("fish");

// Fish swims through the upper/mid frame; text overlays anchor to the
// bottom of the screen, so the two don't visually collide.
const fishPath = [
  { progress: 0.00, xPercent: 50, yPercent: 60, scale: 1.0,  flip: false },
  { progress: 0.15, xPercent: 30, yPercent: 45, scale: 1.1,  flip: true  },
  { progress: 0.30, xPercent: 65, yPercent: 55, scale: 0.9,  flip: false },
  { progress: 0.45, xPercent: 40, yPercent: 40, scale: 1.0,  flip: true  },
  { progress: 0.60, xPercent: 55, yPercent: 60, scale: 1.0,  flip: false },
  { progress: 0.75, xPercent: 35, yPercent: 50, scale: 0.85, flip: true  },
  { progress: 0.90, xPercent: 50, yPercent: 45, scale: 1.0,  flip: false },
  { progress: 1.00, xPercent: 50, yPercent: 60, scale: 1.0,  flip: false },
];

// Displayed fish state eases toward its target each frame (including the
// flip, which glides its scaleX sign through zero like a natural turn)
// instead of teleporting, so movement reads as swimming, not snapping.
let fishX = 50, fishY = 60, fishScale = 1.0, fishFlipSign = 1;

function updateFish(combined, now, dt) {
  const p = combined;
  let i = 0;
  for (let j = 0; j < fishPath.length - 1; j++) {
    if (p >= fishPath[j].progress && p <= fishPath[j + 1].progress) { i = j; break; }
    if (j === fishPath.length - 2) i = j;
  }
  const a = fishPath[i];
  const b = fishPath[i + 1];
  const t = a.progress === b.progress ? 0 : (p - a.progress) / (b.progress - a.progress);
  const targetX     = lerp(a.xPercent, b.xPercent, t);
  const targetY     = lerp(a.yPercent, b.yPercent, t);
  const targetScale = lerp(a.scale, b.scale, t);
  const targetFlip  = (t < 0.5 ? a.flip : b.flip) ? -1 : 1;

  fishX        = timeLerp(fishX, targetX, 0.06, dt);
  fishY        = timeLerp(fishY, targetY, 0.06, dt);
  fishScale    = timeLerp(fishScale, targetScale, 0.06, dt);
  fishFlipSign = timeLerp(fishFlipSign, targetFlip, 0.08, dt);

  // Subtle idle "breathing" drift so the fish reads as alive even when
  // scroll is stationary and its eased position has settled.
  const bobX = reduceMotion ? 0 : Math.sin(now / 1400) * 1.2;
  const bobY = reduceMotion ? 0 : Math.cos(now / 1100) * 1.0;

  fishEl.style.left = (fishX + bobX) + "vw";
  fishEl.style.top  = (fishY + bobY) + "vh";
  fishEl.style.transform =
    `translate(-50%,-50%) scaleX(${fishFlipSign}) scale(${fishScale})`;
}

// ── TEXT OVERLAYS ─────────────────────────────────────────────
const textHero    = document.getElementById("text-hero");
const textClosing = document.getElementById("text-closing");

function fadeValue(p, inStart, inEnd, outStart, outEnd) {
  if (p < inStart) return 0;
  if (p < inEnd) return (p - inStart) / (inEnd - inStart);
  if (p < outStart) return 1;
  if (p < outEnd) return 1 - (p - outStart) / (outEnd - outStart);
  return 0;
}

// Text rises slightly and sharpens into focus as it fades in, rather
// than a flat opacity cut — reads as editorial/cinematic rather than a
// basic CSS fade. Eased through easeInOutCubic instead of linear so the
// motion has a designed, weighted feel rather than a raw ramp.
function applyTextEntrance(el, fade) {
  const eased = easeInOutCubic(clamp01(fade));
  el.style.opacity = eased;
  el.style.transform = `translateY(${lerp(14, 0, eased)}px)`;
  el.style.filter = `blur(${lerp(6, 0, eased)}px)`;
}

function updateText(combined) {
  // HERO: reef progress 0.00-0.15 → combined 0 to 0.15*REEF_W
  const heroMax  = 0.15 * REEF_W;
  const heroFade = fadeValue(combined, -0.001, 0, heroMax * 0.7, heroMax);
  applyTextEntrance(textHero, heroFade);

  // CLOSING: current track progress 0.85-1.0 → combined REEF_W+DEEP_W + 0.85*CURR_W
  const cMin = REEF_W + DEEP_W + 0.85 * CURR_W;
  const cMax = REEF_W + DEEP_W + 1.00 * CURR_W;
  const closeFade = fadeValue(combined, cMin, cMin + 0.01, cMax - 0.005, cMax);
  applyTextEntrance(textClosing, closeFade);
}

// ── SCROLL CUE ─────────────────────────────────────────────────
const scrollCueEl = document.getElementById("scroll-cue");
function updateScrollCue(combined) {
  scrollCueEl.style.opacity = combined < 0.01 ? "1" : "0";
}

// ── LOOP WRAP ────────────────────────────────────────────────
// A brief fade-to-ink masks the instant scroll-reset so the loop reads
// as an intentional cut rather than a jarring jump.
let loopCooldown = false;
const loopFadeEl = document.getElementById("loop-fade");

function checkLoopWrap(currentProgress) {
  if (loopCooldown) return;
  if (currentProgress >= 0.995) {
    loopCooldown = true;

    loopFadeEl.style.transition = "opacity 0.3s ease";
    loopFadeEl.style.opacity = "1";

    setTimeout(() => {
      // Fish dart swap
      fishEl.src = "fish-dart.webm";
      fishEl.load();
      fishEl.play().catch(() => {});

      // Jump scroll back to top while the screen is masked
      lenis.scrollTo(0, { immediate: true });
      videoReef.currentTime = 0;
      smoothTime.reef = 0;

      requestAnimationFrame(() => {
        loopFadeEl.style.opacity = "0";
      });
    }, 300);

    // Restore idle fish after the dart plays
    setTimeout(() => {
      fishEl.src = "fish-idle.webm";
      fishEl.load();
      fishEl.play().catch(() => {});

      // Release cooldown shortly after
      setTimeout(() => { loopCooldown = false; }, 200);
    }, 1300);

    // Safety release
    setTimeout(() => { loopCooldown = false; }, 1900);
  }
}

// ── AMBIENT SOUND (synthesized — no audio asset needed) ─────────
// A low detuned drone + slow filter LFO + soft noise bed for a subtle
// underwater ambience. Built lazily on the user's first click so it
// respects browser autoplay-audio policy (requires a user gesture).
let audioCtx = null, masterGain = null, soundOn = false;

function buildAmbientAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(audioCtx.destination);

  const filter = audioCtx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 500;
  filter.connect(masterGain);

  [55, 55.6].forEach((freq) => {
    const osc = audioCtx.createOscillator();
    osc.type = "sine";
    osc.frequency.value = freq;
    const oscGain = audioCtx.createGain();
    oscGain.gain.value = 0.12;
    osc.connect(oscGain);
    oscGain.connect(filter);
    osc.start();
  });

  const lfo = audioCtx.createOscillator();
  lfo.frequency.value = 0.07;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 220;
  lfo.connect(lfoGain);
  lfoGain.connect(filter.frequency);
  lfo.start();

  // Soft filtered noise bed for a "current" texture
  const bufferSize = 2 * audioCtx.sampleRate;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuffer;
  noise.loop = true;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = "bandpass";
  noiseFilter.frequency.value = 800;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0.03;
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(masterGain);
  noise.start();
}

const muteToggle = document.getElementById("mute-toggle");
muteToggle.addEventListener("click", () => {
  if (!audioCtx) buildAmbientAudio();
  if (audioCtx.state === "suspended") audioCtx.resume();

  soundOn = !soundOn;
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(soundOn ? 0.4 : 0, audioCtx.currentTime + 0.8);
  muteToggle.textContent = soundOn ? "Sound On" : "Sound Off";
});

// ── MAIN LOOP ────────────────────────────────────────────────
// A single continuous rAF loop (rather than scroll-event-gated ticks)
// drives every scroll-linked effect, so motion stays smooth regardless
// of how large or fast a given scroll/wheel delta was. dt (ms since the
// last frame) is threaded through every eased value so motion speed
// stays consistent across refresh rates instead of scaling with fps.
let lastFrameTime = null;
function mainLoop(now) {
  const dt = lastFrameTime === null ? REF_FRAME_MS : clamp(now - lastFrameTime, 0, 100);
  lastFrameTime = now;

  const pReef    = trackLocalProgress(trackReef);
  const pDeep    = trackLocalProgress(trackDeep);
  const pCurrent = trackLocalProgress(trackCurrent);

  smoothScrub(videoReef, pReef, durationReef, "reef", dt);
  smoothScrub(videoDeep, pDeep, durationDeep, "deep", dt);
  smoothScrub(videoCurrent, pCurrent, durationCurrent, "current", dt);

  const combined = getCombinedProgress(pReef, pDeep, pCurrent);

  updateSceneOpacity(combined, dt);
  updateFish(combined, now, dt);
  updateText(combined);
  updateScrollCue(combined);
  checkLoopWrap(pCurrent);

  requestAnimationFrame(mainLoop);
}
requestAnimationFrame(mainLoop);

ScrollTrigger.refresh();
</script>
</body>
